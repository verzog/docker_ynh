#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "docker_container"
name = "Docker Container"
description.en = "Deploy and manage a Docker container on your YunoHost server"
description.fr = "Déployez et gérez un conteneur Docker sur votre serveur YunoHost"

version = "1.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
code = "https://github.com/verzog/docker_ynh"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = false
sso = false
disk = "500M"
ram.build = "200M"
ram.runtime = "200M"

[install]

    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/app"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.image]
    ask.en = "Docker image to pull (e.g. nginx:alpine, from hub.docker.com)"
    ask.fr = "Image Docker à télécharger (ex: nginx:alpine, depuis hub.docker.com)"
    type = "string"
    example = "nginx:alpine"

    [install.container_port]
    ask.en = "Which port does the container expose internally? (e.g. 80 for nginx, 8080 for many Java apps)"
    ask.fr = "Sur quel port le conteneur écoute-t-il en interne ? (ex: 80 pour nginx, 8080 pour les apps Java)"
    type = "number"
    min = 1
    max = 65535
    default = 80

    [install.restart_policy]
    ask.en = "Should the container automatically restart if it stops?"
    ask.fr = "Le conteneur doit-il redémarrer automatiquement s'il s'arrête ?"
    type = "select"
    choices.always = "Always"
    choices.unless-stopped = "Unless stopped (recommended)"
    choices.on-failure = "On failure only"
    choices.no = "Never"
    default = "unless-stopped"

    [install.use_data_volume]
    ask.en = "Mount a persistent data directory into the container at /data?"
    ask.fr = "Monter un répertoire de données persistant dans le conteneur à /data ?"
    type = "boolean"
    default = true

    [install.docker_options]
    ask.en = "Additional Docker options (env vars, extra volumes, etc.). Do not add port mappings here."
    ask.fr = "Options Docker supplémentaires (variables d'environnement, volumes, etc.). Ne pas ajouter de ports ici."
    type = "string"
    example = "-e MY_VAR=value -e ANOTHER_VAR=other"
    optional = true
    default = ""

[resources]

    [resources.system_user]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 8095

