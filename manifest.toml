#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "docker_container"
name = "Docker Container"
description.en = "Deploy and manage a Docker container on your YunoHost server"
description.fr = "Déployez et gérez un conteneur Docker sur votre serveur YunoHost"

version = "1.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
code = "https://github.com/verzog/docker_ynh"
admindoc = "https://github.com/verzog/docker_ynh/blob/main/doc/ADMIN.md"
userdoc = "https://github.com/verzog/docker_ynh/blob/main/README.md"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = false
sso = false
disk = "500M"
ram.build = "200M"
ram.runtime = "200M"

[install]

    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/app"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.image]
    ask.en = "Which application do you want to deploy? Only vetted free-software images are offered. The image reference, version and internal port are managed by the package."
    ask.fr = "Quelle application voulez-vous déployer ? Seules des images de logiciels libres vérifiées sont proposées. La référence de l'image, sa version et son port interne sont gérés par le paquet."
    type = "select"
    choices = ["vaultwarden", "gitea", "freshrss", "uptime-kuma", "ghost", "nginx", "mariadb", "postgres"]
    default = "nginx"

    [install.restart_policy]
    ask.en = "Should the container automatically restart if it stops?"
    ask.fr = "Le conteneur doit-il redémarrer automatiquement s'il s'arrête ?"
    type = "select"
    choices = ["always", "unless-stopped", "on-failure", "no"]
    default = "unless-stopped"

    [install.use_data_volume]
    ask.en = "Mount a persistent data directory into the container at /data?"
    ask.fr = "Monter un répertoire de données persistant dans le conteneur à /data ?"
    type = "boolean"
    default = true

    [install.docker_network]
    ask.en = "Optional: Docker network name to connect with other containers (e.g., 'my-app-network'). Containers on the same network can reach each other by service name. Leave empty for default bridge network (isolated)."
    ask.fr = "Optionnel : Nom du réseau Docker pour se connecter à d'autres conteneurs (ex: 'mon-reseau-app'). Les conteneurs sur le même réseau peuvent se rejoindre par nom de service. Laisser vide pour le réseau par défaut (isolé)."
    type = "string"
    optional = true
    default = ""

    [install.docker_options]
    ask.en = "Additional Docker options (environment variables, volumes, etc.). Do not add port mappings here. Examples:\n  -e VAR=value (set environment variable)\n  -e DB_HOST=localhost -e DB_USER=admin (Moodle, etc.)\n  -v /host/path:/container/path (mount additional volumes)\nSee DOCKER_IMAGES.md for setup instructions for specific images."
    ask.fr = "Options Docker supplémentaires (variables d'environnement, volumes, etc.). Ne pas ajouter de ports ici. Exemples:\n  -e VAR=value (définir une variable d'environnement)\n  -e DB_HOST=localhost -e DB_USER=admin (Moodle, etc.)\n  -v /host/path:/container/path (monter des volumes supplémentaires)\nVoir DOCKER_IMAGES.md pour les instructions de configuration pour des images spécifiques."
    type = "string"
    example = "-e MY_VAR=value -e ANOTHER_VAR=other"
    optional = true
    default = ""

[resources]

    [resources.system_user]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]
    main.default = 8095

