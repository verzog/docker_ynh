#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

    proxy_pass http://127.0.0.1:__PORT__/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Rewrite Location headers from the container to include the subpath prefix.
    # Without this, a redirect to /setup becomes /setup at the root domain instead
    # of __PATH__/setup, sending the browser to the YunoHost portal.
    #sub_path_only proxy_redirect / __PATH__/;

    proxy_read_timeout 86400;
}
