#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# Serve a restrictive robots.txt for the app's subpath so search engines
# don't crawl admin UIs (e.g. Portainer), which can trip Google Safe Browsing
# phishing heuristics on login pages.
location = __PATH__/robots.txt {
    add_header Content-Type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
}

location __PATH__/ {

    proxy_pass http://127.0.0.1:__PORT__/;

    # Retry failed connections (transient startup failures)
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 5;
    proxy_next_upstream_timeout 30s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Block search-engine indexing of the proxied app. Admin UIs are not
    # meant to be crawled, and indexed login pages are a common cause of
    # Safe Browsing false-positives.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Baseline security headers. These don't clear an existing Safe Browsing
    # flag on their own, but they harden the response and are weighed by
    # reputation classifiers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Rewrite Location headers from the container to include the subpath prefix.
    # Without this, a redirect to /setup becomes /setup at the root domain instead
    # of __PATH__/setup, sending the browser to the YunoHost portal.
    #sub_path_only proxy_redirect / __PATH__/;

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    error_page 502 503 504 = @unavailable;
}

location @unavailable {
    default_type text/html;
    return 503 "Container is starting or not responding. Please wait and refresh.";
}
