#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/tests.v1.schema.json

test_format = 1.0

[default]

    # Docker containers don't have a web URL, disable URL-based tests
    exclude = ["install.root", "install.subdir", "change_url"]

    # Provide a known-good lightweight image for CI tests
    args.image = "hello-world"
    args.container_name = "test-container"
    args.restart_policy = "no"
    args.use_data_volume = false
    args.docker_options = ""
